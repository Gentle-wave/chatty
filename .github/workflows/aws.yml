name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Zero-downtime deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e  # Exit on error
          
          echo "🚀 Starting zero-downtime deployment..."
          cd ~/api-prod/chatty
          
          # Store current version
          CURRENT_COMMIT=$(git rev-parse HEAD)
          echo "Current version: $CURRENT_COMMIT"
          
          # Pull latest code
          echo "📦 Pulling latest code..."
          git pull origin main
          
          NEW_COMMIT=$(git rev-parse HEAD)
          echo "New version: $NEW_COMMIT"
          
          if [ "$CURRENT_COMMIT" = "$NEW_COMMIT" ]; then
            echo "✅ Already at latest version. Exiting."
            exit 0
          fi
          
          # Install dependencies
          echo "📦 Installing dependencies..."
          npm ci
          
          # Check current PM2 mode
          if pm2 show chatty-prod &>/dev/null; then
            CURRENT_MODE=$(pm2 show chatty-prod | grep "exec mode" | awk '{print $NF}')
            echo "Current mode: $CURRENT_MODE"
            
            if [ "$CURRENT_MODE" = "cluster" ]; then
              # Zero-downtime reload
              echo "🔄 Reloading with zero downtime..."
              pm2 reload chatty-prod
            else
              # Switch to cluster mode
              echo "🔄 Switching to cluster mode..."
              pm2 delete chatty-prod
              pm2 start src/index.js -i max --name chatty-prod
            fi
          else
            # First time setup
            echo "🆕 First time setup - starting in cluster mode..."
            pm2 start src/index.js -i max --name chatty-prod
          fi
          
          # Wait for app to be ready
          echo "⏳ Waiting for app to be ready..."
          sleep 5
          
          # Health check
          echo "🏥 Running health check..."
          if curl -f http://localhost:5000/health; then
            echo "✅ Health check passed!"
          else
            echo "❌ Health check failed!"
            # Rollback logic could go here
            exit 1
          fi
          
          # Save PM2 config
          pm2 save
          
          echo "🎉 Deployment complete! Zero downtime achieved."
          echo "📊 PM2 Status:"
          pm2 list
